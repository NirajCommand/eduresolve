<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Teacher List</title>
<link rel="stylesheet" href="hod.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="theme.js"></script>
</head>

<body>

<nav class="navbar-custom">
  <div class="logo" onclick="window.location.href='hod-dashboard.html'">
    EduResolve
  </div>
</nav>

<div class="requests-container">
  <h2>Teachers & Academic Mapping</h2>
  <div id="teacherContainer"></div>
</div>

<script>
const { createClient } = supabase;
const client = createClient("https://zwpjavmrgveckswnobhg.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3cGphdm1yZ3ZlY2tzd25vYmhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NDg0MzcsImV4cCI6MjA4ODAyNDQzN30.jZUB2M-mqpWC1vkiMyVJFZU9ez0wKXsiTPbg8ndNITw");

async function loadTeachers(){

  const { data:{ user } } = await client.auth.getUser();

  const { data: profile } = await client
    .from("users")
    .select("institution")
    .eq("id", user.id)
    .single();

  const institution = profile.institution;

  const { data: teachers } = await client
    .from("users")
    .select("id, name")
    .eq("role","teacher")
    .eq("institution", institution);

  const container = document.getElementById("teacherContainer");
  container.innerHTML = "";

  const oneWeekAgo = new Date();
  oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);

  for (let teacher of teachers || []) {

    // Get teams + course
    const { data: teams } = await client
      .from("teams")
      .select(`
        id,
        team_name,
        courses(course_name)
      `)
      .eq("teacher_id", teacher.id);

    const teamIds = teams?.map(t => t.id) || [];

    let total = 0;
    let solved = 0;
    let ratingSum = 0;
    let ratingCount = 0;

    if(teamIds.length > 0){

      const { data: queries } = await client
        .from("queries")
        .select("status, feedback_rating, created_at")
        .in("team_id", teamIds)
        .gte("created_at", oneWeekAgo.toISOString());

      total = queries?.length || 0;
      solved = queries?.filter(q => q.status === "answered").length || 0;

      queries?.forEach(q=>{
        if(q.feedback_rating){
          ratingSum += q.feedback_rating;
          ratingCount++;
        }
      });
    }

    const averageRating = ratingCount > 0
      ? (ratingSum / ratingCount).toFixed(2)
      : "No ratings";

    container.innerHTML += `
      <div class="report-card">
        <h5>${teacher.name}</h5>

        ${teams && teams.length > 0 ? teams.map(t => `
          <p>
            Course: ${t.courses?.course_name || "Not Assigned"} 
            | Team: ${t.team_name}
          </p>
        `).join("") : "<p>No teams assigned</p>"}

        <hr>

        <p><strong>Weekly Queries:</strong> ${total}</p>
        <p><strong>Solved:</strong> ${solved}</p>
        <p><strong>Pending:</strong> ${total - solved}</p>
        <p><strong>Average Rating:</strong> ${averageRating}</p>
      </div>
    `;
  }
}

loadTeachers();


</script>

</body>
</html>
