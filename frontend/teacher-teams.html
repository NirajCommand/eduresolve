<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Teacher Teams | EduResolve</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="teacher_style.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="theme.js"></script>
</head>
<body>
<nav class="navbar-custom">
  <div class="logo" onclick="window.location.href='teacher-dashboard.html'">
    <i class="fa-solid fa-graduation-cap"></i> EduResolve
  </div>
  <div class="nav-center">
    <a href="teacher-dashboard.html">Dashboard</a>
    <a href="teacher-teams.html">Teams</a>
  </div>
  <div class="nav-right">
    <button id="modeBtn" class="mode-btn">
      <i class="fa-solid fa-moon"></i>
    </button>
    <button id="logoutNavBtn" class="logout-nav-btn"><i class="fa-solid fa-right-from-bracket"></i></button>
<div class="menu">
  <i class="fa-solid fa-bars" id="menuIcon"></i>
  <div class="menu-dropdown" id="menuDropdown">
    <a href="#">Profile</a>
    <a href="#" id="logoutBtn">Logout</a>
  </div>
</div>
  </div>
</nav>
<div class="teams-page">
  <h2 class="page-title">Teams Management</h2>
  <div class="section-block">
    <h3 class="section-title">Create Team</h3>
<div class="large-form">
  <input type="text" id="teamName" placeholder="Enter Team Name">
  <button id="createTeamBtn">Create Team</button>
</div>
  </div>
  <div class="section-block">
    <h3 class="section-title">Your Teams</h3>
    <div class="teams-grid" id="myTeamsContainer"></div>
  </div>
  <div class="section-block">
    <h3 class="section-title">Pending Join Requests</h3>
    <div id="pendingContainer"></div>
  </div>
</div>
<script>
document.addEventListener("DOMContentLoaded", async function(){

const SUPABASE_URL = "https://zwpjavmrgveckswnobhg.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3cGphdm1yZ3ZlY2tzd25vYmhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NDg0MzcsImV4cCI6MjA4ODAyNDQzN30.jZUB2M-mqpWC1vkiMyVJFZU9ez0wKXsiTPbg8ndNITw";

const { createClient } = supabase;
const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* AUTH CHECK */
const { data:{ user } } = await client.auth.getUser();
if(!user){
  window.location.href="login.html";
  return;
}

/* ROLE CHECK */
const { data: profile } = await client
  .from("users")
  .select("role")
  .eq("id", user.id)
  .single();

if(!profile || profile.role !== "teacher"){
  window.location.href="login.html";
  return;
}

/* MENU */
document.getElementById("menuIcon")
.addEventListener("click", function(){
  document.getElementById("menuDropdown")
  .classList.toggle("show-menu");
});

/* LOGOUT */
document.getElementById("logoutBtn")
.addEventListener("click", async function(e){
  e.preventDefault();
  await client.auth.signOut();
  window.location.href="login.html";
});

/* LOGOUT NAV BTN */
document.getElementById("logoutNavBtn")
.addEventListener("click", async function(e){
  e.preventDefault();
  await client.auth.signOut();
  window.location.href="login.html";
});

/* GENERATE CODE */
function generateCode(){
  return Math.floor(100000 + Math.random()*900000).toString();
}

/* CREATE TEAM */
document.getElementById("createTeamBtn")
.addEventListener("click", async function(){

  const name = document.getElementById("teamName").value.trim();
  if(!name){
    alert("Enter team name");
    return;
  }

  const { data: teacher } = await client
    .from("users")
    .select("institution")
    .eq("id", user.id)
    .single();

  let code;
  let exists = true;

  while(exists){
    code = generateCode();

    const { data } = await client
      .from("teams")
      .select("id")
      .eq("join_code", code);

    if(!data || data.length === 0){
      exists = false;
    }
  }

  const { error } = await client
    .from("teams")
    .insert([{
      name: name,
      teacher_id: user.id,
      institution: teacher.institution,
      join_code: code
    }]);

  if(error){
    alert("Error creating team");
    return;
  }

  alert("Team created. Join Code: " + code);
  document.getElementById("teamName").value = "";

  loadTeacherTeams();
});

/* LOAD TEAMS */
async function loadTeacherTeams(){

  const { data: teams } = await client
    .from("teams")
    .select("id, name, join_code")
    .eq("teacher_id", user.id);

  const container = document.getElementById("myTeamsContainer");
  container.innerHTML = "";

  for(const team of teams || []){

    const { count } = await client
      .from("team_members")
      .select("*",{count:"exact",head:true})
      .eq("team_id", team.id)
      .eq("status","approved");

    container.innerHTML += `
      <div class="team-card">
        <h4>${team.name}</h4>
        <p class="join-code">Join Code: ${team.join_code}</p>
        <p class="meta-text">Students: ${count || 0}</p>

        <a href="team-detail.html?team=${team.id}" class="enter-btn">
          Open Team
        </a>
      </div>
    `;
  }
}

/* LOAD PENDING */
async function loadPendingRequests(){

  const { data: teams } = await client
    .from("teams")
    .select("id")
    .eq("teacher_id", user.id);

  const teamIds = teams?.map(t=>t.id) || [];
  if(teamIds.length === 0){
    document.getElementById("pendingContainer").innerHTML="";
    return;
  }

  const { data: requests } = await client
    .from("team_members")
    .select(`
      id,
      team_id,
      teams(name),
      users(name)
    `)
    .in("team_id", teamIds)
    .eq("status","pending");

  const container = document.getElementById("pendingContainer");
  container.innerHTML = "";

  for(const req of requests || []){

    const div = document.createElement("div");
    div.className="request-card";

    div.innerHTML = `
      <strong>${req.users?.name}</strong>
      <p>Requested to join ${req.teams?.name}</p>
      <div class="request-actions">
        <button class="approve-btn">Approve</button>
        <button class="reject-btn">Reject</button>
      </div>
    `;

    div.querySelector(".approve-btn")
    .addEventListener("click", async ()=>{
      await client
        .from("team_members")
        .update({status:"approved"})
        .eq("id", req.id);

      loadPendingRequests();
      loadTeacherTeams();
    });

    div.querySelector(".reject-btn")
    .addEventListener("click", async ()=>{
      await client
        .from("team_members")
        .update({status:"rejected"})
        .eq("id", req.id);

      loadPendingRequests();
    });

    container.appendChild(div);
  }
}

loadTeacherTeams();
loadPendingRequests();

});
</script>
