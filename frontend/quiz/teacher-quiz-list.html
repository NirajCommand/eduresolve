<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Quizzes | EduResolve</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{margin:0;font-family:'Segoe UI',sans-serif;transition:0.3s ease}
body.dark-mode{background:#0f172a;color:#fff}
body.light-mode{background:#f4f6fa;color:#111827}
.navbar-custom{height:65px;padding:0 60px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,#111827,#1f2937);box-shadow:0 6px 18px rgba(0,0,0,0.4);position:fixed;top:0;left:0;right:0;z-index:1000}
body.light-mode .navbar-custom{background:#fff;box-shadow:0 6px 20px rgba(0,0,0,0.08)}
.logo{font-size:20px;font-weight:600;color:#f4c430;cursor:pointer}
.nav-center{display:flex;gap:35px}
.nav-center a{color:#d1d5db;text-decoration:none;font-size:14px}
body.light-mode .nav-center a{color:#1f2937}
.nav-right{display:flex;align-items:center;gap:20px}
.mode-btn{width:36px;height:36px;border-radius:8px;border:none;background:#1e293b;color:#fff;cursor:pointer}
.logout-nav-btn{width:36px;height:36px;border-radius:8px;border:none;background:#1e293b;color:#fff;cursor:pointer}
.menu{position:relative}
.menu-dropdown{display:none;position:absolute;right:0;top:45px;width:160px;background:#1e293b;border-radius:10px;box-shadow:0 10px 25px rgba(0,0,0,0.4)}
body.light-mode .menu-dropdown{background:#fff;box-shadow:0 10px 25px rgba(0,0,0,0.1)}
.menu-dropdown a{display:block;padding:12px 16px;text-decoration:none;color:#fff;font-size:14px}
body.light-mode .menu-dropdown a{color:#1f2937}
.menu-dropdown a:hover{background:#2f6df6}
.show-menu{display:block}
.welcome-box{margin:90px 60px 30px;padding:30px 40px;border-radius:18px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,#2f6df6,#1e4fc4);box-shadow:0 12px 35px rgba(47,109,246,0.4)}
.welcome-box h3{margin:0;font-weight:600}
.welcome-right{text-align:right}
.welcome-right h6{margin:0 0 4px;opacity:0.9}
.welcome-right p{margin:0;font-size:13px;opacity:0.7}
.main-container{padding:20px 60px 80px;max-width:1400px;margin:auto}
.stats-box{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:40px}
.stat-card{padding:25px;border-radius:16px;text-align:center}
body.dark-mode .stat-card{background:#1e293b;box-shadow:0 12px 30px rgba(0,0,0,0.3)}
body.light-mode .stat-card{background:#fff;box-shadow:0 12px 30px rgba(0,0,0,0.08)}
.stat-card h3{margin:0 0 8px;font-size:32px;color:#2f6df6}
.stat-card p{margin:0;font-size:14px;opacity:0.7}
.exams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:25px;margin-bottom:40px}
.exam-card{padding:25px;border-radius:16px;transition:0.35s ease;cursor:pointer}
body.dark-mode .exam-card{background:#1e293b;box-shadow:0 12px 30px rgba(0,0,0,0.3)}
body.light-mode .exam-card{background:#fff;box-shadow:0 12px 30px rgba(0,0,0,0.08)}
.exam-card:hover{transform:translateY(-8px);box-shadow:0 18px 45px rgba(47,109,246,0.3)}
.exam-card h4{margin:0 0 10px;font-size:18px;font-weight:600}
.exam-card p{margin:0 0 15px;font-size:14px;opacity:0.7}
.exam-meta{display:flex;flex-wrap:wrap;gap:12px;font-size:12px;margin-bottom:15px}
.meta-tag{padding:4px 10px;border-radius:20px;font-weight:500}
body.dark-mode .meta-tag{background:rgba(47,109,246,0.15);color:#93c5fd}
body.light-mode .meta-tag{background:rgba(47,109,246,0.1);color:#2f6df6}
.exam-actions{display:flex;gap:10px}
.exam-actions button{flex:1;padding:10px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:0.3s ease}
.btn-primary{background:linear-gradient(135deg,#2f6df6,#1e4fc4);color:#fff}
.btn-primary:hover{box-shadow:0 10px 25px rgba(47,109,246,0.4)}
.btn-secondary{background:rgba(47,109,246,0.15);color:#2f6df6}
.btn-danger{background:rgba(239,68,68,0.15);color:#ef4444}
.btn-success{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff}
.badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase}
.badge-draft{background:rgba(107,114,128,0.15);color:#6b7280}
.badge-published{background:rgba(34,197,94,0.15);color:#22c55e}
.empty-state{text-align:center;padding:60px 20px;opacity:0.5}
.empty-state i{font-size:64px;margin-bottom:20px;color:#2f6df6}
@media(max-width:768px){.navbar-custom{padding:0 20px}.nav-center{display:none}.welcome-box{margin:90px 20px 20px;padding:20px;flex-direction:column;text-align:center;gap:15px}.main-container{padding:20px}.exams-grid{grid-template-columns:1fr}}
</style>
<script src="../theme.js"></script>
</head>
<body>
<nav class="navbar-custom">
  <div class="logo" id="logoBtn"><i class="fa-solid fa-graduation-cap"></i> EduResolve</div>
  <div class="nav-center">
    <a href="../teacher-dashboard.html">Dashboard</a>
    <a href="#">My Courses</a>
    <a href="#">Search</a>
  </div>
  <div class="nav-right">
    <button id="modeBtn" class="mode-btn"><i class="fa-solid fa-moon"></i></button>
    <button id="logoutNavBtn" class="logout-nav-btn"><i class="fa-solid fa-right-from-bracket"></i></button>
    <div class="menu">
      <i class="fa-solid fa-bars" id="menuIcon"></i>
      <div class="menu-dropdown" id="menuDropdown">
        <a href="../teacher-dashboard.html">Dashboard</a>
        <a href="#" id="logoutBtn">Logout</a>
      </div>
    </div>
  </div>
</nav>
<div class="welcome-box">
  <div><h3 id="teacherName">Loading...</h3></div>
  <div class="welcome-right"><h6 id="teacherInstitution"></h6><p id="teacherDate"></p></div>
</div>
<div class="main-container">
  <div class="stats-box">
    <div class="stat-card"><h3 id="totalQuizzes">0</h3><p>Total Quizzes</p></div>
    <div class="stat-card"><h3 id="publishedQuizzes">0</h3><p>Published</p></div>
    <div class="stat-card"><h3 id="draftQuizzes">0</h3><p>Drafts</p></div>
    <div class="stat-card"><h3 id="totalSubmissions">0</h3><p>Total Submissions</p></div>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <h3><i class="fa-solid fa-pen-to-square"></i> My Quizzes</h3>
    <button class="btn btn-primary" onclick="window.location.href='teacher-quiz-create.html'"><i class="fa-solid fa-plus"></i> Create Quiz</button>
  </div>
  <div id="quizzesContainer" class="exams-grid"></div>
</div>
<script>
document.addEventListener("DOMContentLoaded",async function(){
const SUPABASE_URL="https://zwpjavmrgveckswnobhg.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3cGphdm1yZ3ZlY2tzd25vYmhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NDg0MzcsImV4cCI6MjA4ODAyNDQzN30.jZUB2M-mqpWC1vkiMyVJFZU9ez0wKXsiTPbg8ndNITw";
const supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const{data:{user}}=await supabase.auth.getUser();
if(!user){window.location.href="../login.html";return}
const{data:profile}=await supabase.from("users").select("name,institution,role").eq("id",user.id).single();
if(!profile||profile.role!=="teacher"){window.location.href="../login.html";return}
document.getElementById("teacherName").innerText="Welcome, "+profile.name;
document.getElementById("teacherInstitution").innerText=profile.institution;
document.getElementById("teacherDate").innerText=new Date().toLocaleDateString("en-IN",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
async function loadQuizzes(){
  const{data:quizzes}=await supabase.from("quizzes").select("*").eq("teacher_id",user.id).order("created_at",{ascending:false});
  const container=document.getElementById("quizzesContainer");
  container.innerHTML="";
  if(!quizzes||quizzes.length===0){container.innerHTML='<div class="empty-state"><i class="fa-solid fa-pen-to-square"></i><h4>No quizzes yet</h4><p>Create your first MCQ quiz</p></div>';document.getElementById("totalQuizzes").innerText="0";document.getElementById("publishedQuizzes").innerText="0";document.getElementById("draftQuizzes").innerText="0";document.getElementById("totalSubmissions").innerText="0";return}
  let totalSubs=0;
  const published=quizzes.filter(q=>q.status==="published").length;
  const drafts=quizzes.filter(q=>q.status==="draft").length;
  document.getElementById("totalQuizzes").innerText=quizzes.length;
  document.getElementById("publishedQuizzes").innerText=published;
  document.getElementById("draftQuizzes").innerText=drafts;
  for(const q of quizzes){
    const{count:qCount}=await supabase.from("quiz_questions").select("*",{count:"exact",head:true}).eq("quiz_id",q.id);
    const{count:sCount}=await supabase.from("quiz_submissions").select("*",{count:"exact",head:true}).eq("quiz_id",q.id);
    totalSubs+=(sCount||0);
    const statusBadge=q.status==="published"?'<span class="badge badge-published">Published</span>':'<span class="badge badge-draft">Draft</span>';
    container.innerHTML+=`<div class="exam-card"><h4>${q.title}</h4><p>${q.description||"No description"}</p><div class="exam-meta"><span class="meta-tag">${qCount||0} Questions</span><span class="meta-tag">${q.time_limit||30} min</span>${statusBadge}<span class="meta-tag">${sCount||0} submissions</span></div><div class="exam-actions"><button class="btn-primary" onclick="window.location.href='teacher-quiz-results.html?id=${q.id}'"><i class="fa-solid fa-chart-bar"></i> Results</button>${q.status==="draft"?`<button class="btn-success" onclick="publishQuiz('${q.id}')"><i class="fa-solid fa-upload"></i> Publish</button>`:`<button class="btn-secondary" onclick="window.location.href='teacher-quiz-create.html?edit=${q.id}'"><i class="fa-solid fa-edit"></i> Edit</button>`}<button class="btn-danger" onclick="deleteQuiz('${q.id}')"><i class="fa-solid fa-trash"></i></button></div></div>`;
  }
  document.getElementById("totalSubmissions").innerText=totalSubs;
}
window.publishQuiz=async function(id){
  if(!confirm("Publish this quiz? Students will be able to see it."))return;
  const{error}=await supabase.from("quizzes").update({status:"published"}).eq("id",id);
  if(error){alert("Failed: "+error.message);return}
  loadQuizzes();
};
window.deleteQuiz=async function(id){
  if(!confirm("Delete this quiz and all submissions?"))return;
  await supabase.from("quiz_answers").delete().neq("id","00000000-0000-0000-0000-000000000000");
  await supabase.from("quiz_submissions").delete().eq("quiz_id",id);
  await supabase.from("quiz_questions").delete().eq("quiz_id",id);
  const{error}=await supabase.from("quizzes").delete().eq("id",id);
  if(error){alert("Delete failed");return}
  loadQuizzes();
};
loadQuizzes();
document.getElementById("menuIcon").addEventListener("click",function(){document.getElementById("menuDropdown").classList.toggle("show-menu")});
document.getElementById("logoutBtn").addEventListener("click",async function(e){e.preventDefault();await supabase.auth.signOut();window.location.href="../login.html"});
document.getElementById("logoutNavBtn").addEventListener("click",async function(e){e.preventDefault();await supabase.auth.signOut();window.location.href="../login.html"});
document.getElementById("logoBtn").addEventListener("click",function(){window.location.href="../teacher-dashboard.html"});
});
</script>
</body>
</html>
