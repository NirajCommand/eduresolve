<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Quiz | EduResolve</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{margin:0;font-family:'Segoe UI',sans-serif;transition:0.3s ease}
body.dark-mode{background:#0f172a;color:#fff}
body.light-mode{background:#f4f6fa;color:#111827}
.navbar-custom{height:65px;padding:0 60px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,#111827,#1f2937);box-shadow:0 6px 18px rgba(0,0,0,0.4);position:fixed;top:0;left:0;right:0;z-index:1000}
body.light-mode .navbar-custom{background:#fff;box-shadow:0 6px 20px rgba(0,0,0,0.08)}
.logo{font-size:20px;font-weight:600;color:#f4c430;cursor:pointer}
.nav-center{display:flex;gap:35px}
.nav-center a{color:#d1d5db;text-decoration:none;font-size:14px}
body.light-mode .nav-center a{color:#1f2937}
.nav-right{display:flex;align-items:center;gap:20px}
.mode-btn{width:36px;height:36px;border-radius:8px;border:none;background:#1e293b;color:#fff;cursor:pointer}
.logout-nav-btn{width:36px;height:36px;border-radius:8px;border:none;background:#1e293b;color:#fff;cursor:pointer}
.menu{position:relative}
.menu-dropdown{display:none;position:absolute;right:0;top:45px;width:160px;background:#1e293b;border-radius:10px;box-shadow:0 10px 25px rgba(0,0,0,0.4)}
body.light-mode .menu-dropdown{background:#fff;box-shadow:0 10px 25px rgba(0,0,0,0.1)}
.menu-dropdown a{display:block;padding:12px 16px;text-decoration:none;color:#fff;font-size:14px}
body.light-mode .menu-dropdown a{color:#1f2937}
.menu-dropdown a:hover{background:#2f6df6}
.show-menu{display:block}
.welcome-box{margin:90px 60px 30px;padding:30px 40px;border-radius:18px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,#2f6df6,#1e4fc4);box-shadow:0 12px 35px rgba(47,109,246,0.4)}
.welcome-box h3{margin:0;font-weight:600}
.welcome-right{text-align:right}
.welcome-right h6{margin:0 0 4px;opacity:0.9}
.welcome-right p{margin:0;font-size:13px;opacity:0.7}
.main-container{padding:20px 60px 80px;max-width:1400px;margin:auto}
.form-section{padding:30px;border-radius:16px;margin-bottom:30px}
body.dark-mode .form-section{background:#1e293b;box-shadow:0 12px 30px rgba(0,0,0,0.3)}
body.light-mode .form-section{background:#fff;box-shadow:0 12px 30px rgba(0,0,0,0.08)}
.form-section h3{margin:0 0 25px;font-size:20px;font-weight:600;padding-bottom:15px;border-bottom:2px solid rgba(47,109,246,0.2)}
.form-group{margin-bottom:20px}
.form-group label{display:block;margin-bottom:8px;font-weight:500;font-size:14px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 16px;border-radius:10px;border:2px solid rgba(47,109,246,0.15);font-size:14px;transition:0.3s ease;box-sizing:border-box;font-family:inherit}
body.dark-mode .form-group input,body.dark-mode .form-group select,body.dark-mode .form-group textarea{background:#0f172a;color:#fff;border-color:rgba(47,109,246,0.2)}
body.light-mode .form-group input,body.light-mode .form-group select,body.light-mode .form-group textarea{background:#f8fafc;color:#111827;border-color:#e2e8f0}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#2f6df6;box-shadow:0 0 0 3px rgba(47,109,246,0.15)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.form-check{display:flex;align-items:center;gap:10px;margin-bottom:15px}
.form-check input[type="checkbox"]{width:18px;height:18px;accent-color:#2f6df6}
.form-check label{margin:0;font-size:14px}
.btn-primary{background:linear-gradient(135deg,#2f6df6,#1e4fc4);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-weight:600;cursor:pointer}
.btn-primary:hover{box-shadow:0 10px 25px rgba(47,109,246,0.4)}
.btn-success{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-weight:600;cursor:pointer}
.btn-danger{background:rgba(239,68,68,0.15);color:#ef4444;border:none;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px}
.question-builder{padding:25px;border-radius:12px;margin-bottom:20px;border:2px solid rgba(47,109,246,0.15)}
body.dark-mode .question-builder{background:#0f172a}
body.light-mode .question-builder{background:#f8fafc}
.question-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.question-header h4{margin:0;font-size:16px;color:#2f6df6}
.option-row{display:grid;grid-template-columns:auto 1fr 1fr auto;gap:10px;align-items:center;margin-bottom:10px}
.option-row input[type="radio"]{width:20px;height:20px;accent-color:#22c55e}
.option-row input[type="text"]{padding:10px;border-radius:8px;border:1px solid rgba(47,109,246,0.15);font-size:14px}
body.dark-mode .option-row input[type="text"]{background:#1e293b;color:#fff}
body.light-mode .option-row input[type="text"]{background:#fff;color:#111827}
.option-row .file-input-wrapper{position:relative}
.option-row .file-input-wrapper input[type="file"]{width:150px;padding:6px;font-size:12px}
.option-row .img-preview{width:60px;height:60px;object-fit:cover;border-radius:8px;border:1px solid rgba(47,109,246,0.2)}
@media(max-width:768px){.navbar-custom{padding:0 20px}.nav-center{display:none}.welcome-box{margin:90px 20px 20px;padding:20px;flex-direction:column;text-align:center;gap:15px}.main-container{padding:20px}.form-row{grid-template-columns:1fr}.option-row{grid-template-columns:1fr}}
</style>
<script src="../theme.js"></script>
</head>
<body>
<nav class="navbar-custom">
  <div class="logo" id="logoBtn"><i class="fa-solid fa-graduation-cap"></i> EduResolve</div>
  <div class="nav-center">
    <a href="../teacher-dashboard.html">Dashboard</a>
    <a href="teacher-quiz-list.html">My Quizzes</a>
    <a href="#">Search</a>
  </div>
  <div class="nav-right">
    <button id="modeBtn" class="mode-btn"><i class="fa-solid fa-moon"></i></button>
    <button id="logoutNavBtn" class="logout-nav-btn"><i class="fa-solid fa-right-from-bracket"></i></button>
    <div class="menu">
      <i class="fa-solid fa-bars" id="menuIcon"></i>
      <div class="menu-dropdown" id="menuDropdown">
        <a href="../teacher-dashboard.html">Dashboard</a>
        <a href="#" id="logoutBtn">Logout</a>
      </div>
    </div>
  </div>
</nav>
<div class="welcome-box">
  <div><h3 id="teacherName">Loading...</h3></div>
  <div class="welcome-right"><h6 id="teacherInstitution"></h6><p id="teacherDate"></p></div>
</div>
<div class="main-container">
  <div class="form-section">
    <h3><i class="fa-solid fa-gear"></i> Quiz Settings</h3>
    <div class="form-group"><label>Title</label><input type="text" id="quizTitle" required placeholder="Quiz title"></div>
    <div class="form-group"><label>Description</label><textarea id="quizDesc" rows="2" placeholder="Brief description"></textarea></div>
    <div class="form-row">
      <div class="form-group"><label>Team</label><select id="teamSelect" required><option value="">Select team</option></select></div>
      <div class="form-group"><label>Time Limit (minutes)</label><input type="number" id="timeLimit" value="30" min="1"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Max Attempts</label><input type="number" id="maxAttempts" value="1" min="1"></div>
      <div class="form-group"><label>Due Date</label><input type="datetime-local" id="dueDate"></div>
    </div>
    <div class="form-row">
      <div class="form-check"><input type="checkbox" id="shuffleQ"><label for="shuffleQ">Shuffle questions</label></div>
      <div class="form-check"><input type="checkbox" id="showResults" checked><label for="showResults">Show results after submission</label></div>
    </div>
    <div class="form-check"><input type="checkbox" id="showMarksPublic"><label for="showMarksPublic">Show marks publicly to students</label></div>
  </div>
  <div class="form-section">
    <h3><i class="fa-solid fa-list-ol"></i> Questions</h3>
    <div id="questionsContainer"></div>
    <button class="btn btn-primary mt-3" onclick="addQuestion()"><i class="fa-solid fa-plus"></i> Add Question</button>
  </div>
  <div style="display:flex;gap:15px;margin-top:30px">
    <button class="btn btn-primary flex-fill" onclick="saveDraft()"><i class="fa-solid fa-save"></i> Save Draft</button>
    <button class="btn btn-success flex-fill" onclick="publishQuiz()"><i class="fa-solid fa-upload"></i> Publish Quiz</button>
  </div>
</div>
<script>
document.addEventListener("DOMContentLoaded",async function(){
const SUPABASE_URL="https://zwpjavmrgveckswnobhg.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3cGphdm1yZ3ZlY2tzd25vYmhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NDg0MzcsImV4cCI6MjA4ODAyNDQzN30.jZUB2M-mqpWC1vkiMyVJFZU9ez0wKXsiTPbg8ndNITw";
window.supabaseClient=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const supabase=window.supabaseClient;
const{data:{user}}=await supabase.auth.getUser();
if(!user){window.location.href="../login.html";return}
const{data:profile}=await supabase.from("users").select("name,institution,role").eq("id",user.id).single();
if(!profile||profile.role!=="teacher"){window.location.href="../login.html";return}
document.getElementById("teacherName").innerText="Welcome, "+profile.name;
document.getElementById("teacherInstitution").innerText=profile.institution;
document.getElementById("teacherDate").innerText=new Date().toLocaleDateString("en-IN",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
const{data:teams}=await supabase.from("teams").select("id,name").eq("teacher_id",user.id);
const select=document.getElementById("teamSelect");
teams?.forEach(t=>{const o=document.createElement("option");o.value=t.id;o.textContent=t.name;select.appendChild(o)});
const params=new URLSearchParams(window.location.search);
const editId=params.get("edit");
if(editId)loadQuizForEdit(editId);
});
let questionCount=0;
function addQuestion(data){
  questionCount++;
  const q=data||{qText:"",qImg:"",optA:"",optAImg:"",optB:"",optBImg:"",optC:"",optCImg:"",optD:"",optDImg:"",correct:"a",points:1};
  const html=`<div class="question-builder" id="q${questionCount}"><div class="question-header"><h4>Question ${questionCount}</h4><button class="btn-danger" onclick="document.getElementById('q${questionCount}').remove()"><i class="fa-solid fa-trash"></i></button></div><div class="form-group"><label>Question Text</label><textarea rows="2" placeholder="Enter question text">${q.qText}</textarea></div><div class="form-group"><label>Question Image (optional)</label><input type="file" accept="image/*" class="q-img-input"><div class="img-preview-container">${q.qImg?`<img src="${q.qImg}" class="img-preview">`:""}</div></div><div style="margin-bottom:10px;font-weight:500;font-size:13px">Options (select correct answer with radio button)</div><div class="option-row"><input type="radio" name="correct${questionCount}" value="a" ${q.correct==="a"?"checked":""}><input type="text" placeholder="Option A text" value="${q.optA}"><input type="file" accept="image/*" class="opt-img-input" data-opt="a"><div class="img-preview-container">${q.optAImg?`<img src="${q.optAImg}" class="img-preview">`:""}</div></div><div class="option-row"><input type="radio" name="correct${questionCount}" value="b" ${q.correct==="b"?"checked":""}><input type="text" placeholder="Option B text" value="${q.optB}"><input type="file" accept="image/*" class="opt-img-input" data-opt="b"><div class="img-preview-container">${q.optBImg?`<img src="${q.optBImg}" class="img-preview">`:""}</div></div><div class="option-row"><input type="radio" name="correct${questionCount}" value="c" ${q.correct==="c"?"checked":""}><input type="text" placeholder="Option C text" value="${q.optC}"><input type="file" accept="image/*" class="opt-img-input" data-opt="c"><div class="img-preview-container">${q.optCImg?`<img src="${q.optCImg}" class="img-preview">`:""}</div></div><div class="option-row"><input type="radio" name="correct${questionCount}" value="d" ${q.correct==="d"?"checked":""}><input type="text" placeholder="Option D text" value="${q.optD}"><input type="file" accept="image/*" class="opt-img-input" data-opt="d"><div class="img-preview-container">${q.optDImg?`<img src="${q.optDImg}" class="img-preview">`:""}</div></div><div class="form-row"><div class="form-group"><label>Points</label><input type="number" class="q-points" value="${q.points}" min="1"></div></div></div>`;
  document.getElementById("questionsContainer").insertAdjacentHTML("beforeend",html);
}
async function uploadImage(file){
  if(!file)return null;
  const path=`quiz-imgs/${Date.now()}_${file.name}`;
  const{error}=await window.supabaseClient.storage.from("quiz-images").upload(path,file);
  if(error)return null;
  const{data:{publicUrl}}=window.supabaseClient.storage.from("quiz-images").getPublicUrl(path);
  return publicUrl;
}
async function collectQuestions(){
  const builders=document.querySelectorAll(".question-builder");
  const questions=[];
  for(const b of builders){
    const qText=b.querySelector("textarea").value.trim();
    if(!qText)continue;
    const qImgFile=b.querySelector(".q-img-input")?.files[0];
    const qImg=qImgFile?await uploadImage(qImgFile):b.querySelector(".img-preview")?.src||"";
    const correct=b.querySelector(`input[name^="correct"]:checked`)?.value||"a";
    const points=parseInt(b.querySelector(".q-points")?.value)||1;
    const opts={};
    for(const opt of ["a","b","c","d"]){
      const row=b.querySelectorAll(".option-row")[["a","b","c","d"].indexOf(opt)];
      const textInput=row?.querySelector('input[type="text"]');
      const imgInput=row?.querySelector(".opt-img-input");
      const preview=row?.querySelector(".img-preview");
      const text=textInput?.value.trim()||"";
      const img=imgInput?.files[0]?await uploadImage(imgInput.files[0]):preview?.src||"";
      opts[opt]={text,img};
    }
    questions.push({qText,qImg:qImg||"",optA:opts.a.text,optAImg:opts.a.img,optB:opts.b.text,optBImg:opts.b.img,optC:opts.c.text,optCImg:opts.c.img,optD:opts.d.text,optDImg:opts.d.img,correct,points});
  }
  return questions;
}
async function saveQuiz(status){
  const supabase=window.supabaseClient;
  const{data:{user}}=await supabase.auth.getUser();
  const title=document.getElementById("quizTitle").value.trim();
  const desc=document.getElementById("quizDesc").value.trim();
  const teamId=document.getElementById("teamSelect").value;
  const timeLimit=parseInt(document.getElementById("timeLimit").value)||30;
  const maxAttempts=parseInt(document.getElementById("maxAttempts").value)||1;
  const dueDate=document.getElementById("dueDate").value;
  const shuffle=document.getElementById("shuffleQ").checked;
  const showRes=document.getElementById("showResults").checked;
  const showMarks=document.getElementById("showMarksPublic").checked;
  if(!title){alert("Enter quiz title");return null}
  if(!teamId){alert("Select a team");return null}
  const{data:quiz,error:quizErr}=await supabase.from("quizzes").insert({title:title,description:desc,teacher_id:user.id,team_id:teamId,time_limit:timeLimit,max_attempts:maxAttempts,shuffle_questions:shuffle,show_results:showRes,show_marks_publicly:showMarks,status:status,end_time:dueDate?new Date(dueDate).toISOString():new Date(Date.now()+7*24*60*60*1000).toISOString()}).select().single();
  if(quizErr){alert("Quiz save failed: "+quizErr.message);return null}
  const questions=await collectQuestions();
  for(let i=0;i<questions.length;i++){
    const q=questions[i];
    await supabase.from("quiz_questions").insert({quiz_id:quiz.id,question_text:q.qText,question_image_url:q.qImg,option_a_text:q.optA,option_a_image_url:q.optAImg,option_b_text:q.optB,option_b_image_url:q.optBImg,option_c_text:q.optC,option_c_image_url:q.optCImg,option_d_text:q.optD,option_d_image_url:q.optDImg,correct_answer:q.correct,points:q.points,order_index:i});
  }
  return quiz.id;
}
window.saveDraft=async function(){const id=await saveQuiz("draft");if(id){alert("Draft saved!");window.location.href="teacher-quiz-list.html"}};
window.publishQuiz=async function(){const id=await saveQuiz("published");if(id){alert("Quiz published!");window.location.href="teacher-quiz-list.html"}};
async function loadQuizForEdit(id){
  const supabase=window.supabaseClient;
  const{data:quiz}=await supabase.from("quizzes").select("*").eq("id",id).single();
  if(!quiz)return;
  document.getElementById("quizTitle").value=quiz.title||"";
  document.getElementById("quizDesc").value=quiz.description||"";
  document.getElementById("teamSelect").value=quiz.team_id||"";
  document.getElementById("timeLimit").value=quiz.time_limit||30;
  document.getElementById("maxAttempts").value=quiz.max_attempts||1;
  document.getElementById("shuffleQ").checked=quiz.shuffle_questions||false;
  document.getElementById("showResults").checked=quiz.show_results!==false;
  document.getElementById("showMarksPublic").checked=quiz.show_marks_publicly||false;
  if(quiz.end_time)document.getElementById("dueDate").value=new Date(quiz.end_time).toISOString().slice(0,16);
  const{data:questions}=await supabase.from("quiz_questions").select("*").eq("quiz_id",id).order("order_index");
  questions?.forEach(q=>addQuestion({qText:q.question_text||"",qImg:q.question_image_url||"",optA:q.option_a_text||"",optAImg:q.option_a_image_url||"",optB:q.option_b_text||"",optBImg:q.option_b_image_url||"",optC:q.option_c_text||"",optCImg:q.option_c_image_url||"",optD:q.option_d_text||"",optDImg:q.option_d_image_url||"",correct:q.correct_answer||"a",points:q.points||1}));
}
document.getElementById("menuIcon").addEventListener("click",function(){document.getElementById("menuDropdown").classList.toggle("show-menu")});
document.getElementById("logoutBtn").addEventListener("click",async function(e){e.preventDefault();await window.supabaseClient.auth.signOut();window.location.href="../login.html"});
document.getElementById("logoutNavBtn").addEventListener("click",async function(e){e.preventDefault();await window.supabaseClient.auth.signOut();window.location.href="../login.html"});
document.getElementById("logoBtn").addEventListener("click",function(){window.location.href="../teacher-dashboard.html"});
</script>
</body>
</html>
