<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Assignment Submissions | EduResolve</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{margin:0;font-family:'Segoe UI',sans-serif;transition:0.3s ease}
body.dark-mode{background:#0f172a;color:#fff}
body.light-mode{background:#f4f6fa;color:#111827}
.navbar-custom{height:65px;padding:0 60px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,#111827,#1f2937);box-shadow:0 6px 18px rgba(0,0,0,0.4);position:fixed;top:0;left:0;right:0;z-index:1000}
body.light-mode .navbar-custom{background:#fff;box-shadow:0 6px 20px rgba(0,0,0,0.08)}
.logo{font-size:20px;font-weight:600;color:#f4c430;cursor:pointer}
.nav-center{display:flex;gap:35px}
.nav-center a{color:#d1d5db;text-decoration:none;font-size:14px}
body.light-mode .nav-center a{color:#1f2937}
.nav-right{display:flex;align-items:center;gap:20px}
.mode-btn{width:36px;height:36px;border-radius:8px;border:none;background:#1e293b;color:#fff;cursor:pointer}
.logout-nav-btn{width:36px;height:36px;border-radius:8px;border:none;background:#1e293b;color:#fff;cursor:pointer}
.menu{position:relative}
.menu-dropdown{display:none;position:absolute;right:0;top:45px;width:160px;background:#1e293b;border-radius:10px;box-shadow:0 10px 25px rgba(0,0,0,0.4)}
body.light-mode .menu-dropdown{background:#fff;box-shadow:0 10px 25px rgba(0,0,0,0.1)}
.menu-dropdown a{display:block;padding:12px 16px;text-decoration:none;color:#fff;font-size:14px}
body.light-mode .menu-dropdown a{color:#1f2937}
.menu-dropdown a:hover{background:#2f6df6}
.show-menu{display:block}
.welcome-box{margin:90px 60px 30px;padding:30px 40px;border-radius:18px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,#2f6df6,#1e4fc4);box-shadow:0 12px 35px rgba(47,109,246,0.4)}
.welcome-box h3{margin:0;font-weight:600}
.welcome-right{text-align:right}
.welcome-right h6{margin:0 0 4px;opacity:0.9}
.welcome-right p{margin:0;font-size:13px;opacity:0.7}
.main-container{padding:20px 60px 80px;max-width:1400px;margin:auto}
.stats-box{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:40px}
.stat-card{padding:25px;border-radius:16px;text-align:center}
body.dark-mode .stat-card{background:#1e293b;box-shadow:0 12px 30px rgba(0,0,0,0.3)}
body.light-mode .stat-card{background:#fff;box-shadow:0 12px 30px rgba(0,0,0,0.08)}
.stat-card h3{margin:0 0 8px;font-size:32px;color:#2f6df6}
.stat-card p{margin:0;font-size:14px;opacity:0.7}
.submission-card{padding:25px;border-radius:16px;margin-bottom:20px}
body.dark-mode .submission-card{background:#1e293b;box-shadow:0 12px 30px rgba(0,0,0,0.3)}
body.light-mode .submission-card{background:#fff;box-shadow:0 12px 30px rgba(0,0,0,0.08)}
.submission-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
.student-info{display:flex;align-items:center;gap:15px}
.student-avatar{width:45px;height:45px;border-radius:50%;background:linear-gradient(135deg,#2f6df6,#1e4fc4);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:18px}
.score-display{font-size:24px;font-weight:700;color:#2f6df6}
.form-group{margin-bottom:15px}
.form-group label{display:block;margin-bottom:8px;font-weight:500;font-size:14px}
.form-group input,.form-group textarea{width:100%;padding:12px 16px;border-radius:10px;border:2px solid rgba(47,109,246,0.15);font-size:14px;box-sizing:border-box;font-family:inherit}
body.dark-mode .form-group input,body.dark-mode .form-group textarea{background:#0f172a;color:#fff;border-color:rgba(47,109,246,0.2)}
body.light-mode .form-group input,body.light-mode .form-group textarea{background:#f8fafc;color:#111827;border-color:#e2e8f0}
.btn-primary{background:linear-gradient(135deg,#2f6df6,#1e4fc4);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-weight:600;cursor:pointer}
.btn-primary:hover{box-shadow:0 10px 25px rgba(47,109,246,0.4)}
.btn-secondary{background:rgba(47,109,246,0.15);color:#2f6df6;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;text-decoration:none;display:inline-block}
.empty-state{text-align:center;padding:60px 20px;opacity:0.5}
.empty-state i{font-size:64px;margin-bottom:20px;color:#2f6df6}
.eval-section{display:none;margin-top:15px;padding-top:15px;border-top:1px solid rgba(47,109,246,0.2)}
.eval-section.show{display:block}
@media(max-width:768px){.navbar-custom{padding:0 20px}.nav-center{display:none}.welcome-box{margin:90px 20px 20px;padding:20px;flex-direction:column;text-align:center;gap:15px}.main-container{padding:20px}}
</style>
<script src="../theme.js"></script>
</head>
<body>
<nav class="navbar-custom">
  <div class="logo" id="logoBtn"><i class="fa-solid fa-graduation-cap"></i> EduResolve</div>
  <div class="nav-center">
    <a href="../teacher-dashboard.html">Dashboard</a>
    <a href="teacher-assignment-list.html">My Assignments</a>
  </div>
  <div class="nav-right">
    <button id="modeBtn" class="mode-btn"><i class="fa-solid fa-moon"></i></button>
    <button id="logoutNavBtn" class="logout-nav-btn"><i class="fa-solid fa-right-from-bracket"></i></button>
    <div class="menu">
      <i class="fa-solid fa-bars" id="menuIcon"></i>
      <div class="menu-dropdown" id="menuDropdown">
        <a href="../teacher-dashboard.html">Dashboard</a>
        <a href="#" id="logoutBtn">Logout</a>
      </div>
    </div>
  </div>
</nav>
<div class="welcome-box">
  <div><h3 id="assignTitle">Loading...</h3><p id="assignDesc"></p></div>
  <div class="welcome-right"><h6 id="teacherInstitution"></h6><p id="teacherDate"></p></div>
</div>
<div class="main-container">
  <div class="stats-box">
    <div class="stat-card"><h3 id="totalSubs">0</h3><p>Total Submissions</p></div>
    <div class="stat-card"><h3 id="evaluated">0</h3><p>Evaluated</p></div>
    <div class="stat-card"><h3 id="pending">0</h3><p>Pending</p></div>
    <div class="stat-card"><h3 id="avgMarks">0</h3><p>Average Marks</p></div>
  </div>
  <h3><i class="fa-solid fa-users"></i> Student Submissions</h3>
  <div id="submissionsContainer"></div>
</div>
<script>
document.addEventListener("DOMContentLoaded",async function(){
const SUPABASE_URL="https://zwpjavmrgveckswnobhg.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3cGphdm1yZ3ZlY2tzd25vYmhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NDg0MzcsImV4cCI6MjA4ODAyNDQzN30.jZUB2M-mqpWC1vkiMyVJFZU9ez0wKXsiTPbg8ndNITw";
const supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const{data:{user}}=await supabase.auth.getUser();
if(!user){window.location.href="../login.html";return}
const{data:profile}=await supabase.from("users").select("name,institution,role").eq("id",user.id).single();
if(!profile||profile.role!=="teacher"){window.location.href="../login.html";return}
document.getElementById("teacherInstitution").innerText=profile.institution;
document.getElementById("teacherDate").innerText=new Date().toLocaleDateString("en-IN",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
const params=new URLSearchParams(window.location.search);
const assignId=params.get("id");
if(!assignId){alert("No assignment selected");window.location.href="teacher-assignment-list.html";return}
const{data:assign}=await supabase.from("assignments").select("*").eq("id",assignId).single();
if(!assign||assign.teacher_id!==user.id){alert("Assignment not found");window.location.href="teacher-assignment-list.html";return}
document.getElementById("assignTitle").innerText=assign.title;
document.getElementById("assignDesc").innerText=assign.description||"";
const{data:submissions,error:subsError}=await supabase.from("assignment_submissions").select("id,assignment_id,student_id,file_url,file_name,file_type,file_size,submitted_at,marks_obtained,feedback,evaluated_at").eq("assignment_id",assignId).order("submitted_at",{ascending:false});

if(subsError){console.error("Submissions query error:",subsError)}
console.log("Submissions found:",submissions?.length||0,submissions);

const container=document.getElementById("submissionsContainer");
if(!submissions||submissions.length===0){container.innerHTML='<div class="empty-state"><i class="fa-solid fa-users"></i><h4>No submissions yet</h4></div>';return}

const studentIds=submissions.map(s=>s.student_id);
const{data:students}=await supabase.from("users").select("id,name,email").in("id",studentIds);
const studentMap={};
(students||[]).forEach(s=>{studentMap[s.id]={name:s.name,email:s.email}});
let evaluatedCount=0;
let totalMarks=0;
submissions.forEach((s,idx)=>{
  if(s.marks_obtained!==null&&s.marks_obtained!==undefined)evaluatedCount++;
  if(s.marks_obtained!==null&&s.marks_obtained!==undefined)totalMarks+=s.marks_obtained;
  const studentInfo=studentMap[s.student_id]||{name:"Unknown",email:""};
  const initial=(studentInfo.name||"?")[0].toUpperCase();
  const statusBadge=s.marks_obtained!==null&&s.marks_obtained!==undefined?'<span class="meta-tag" style="background:rgba(34,197,94,0.15);color:#22c55e">Evaluated</span>':'<span class="meta-tag" style="background:rgba(245,158,11,0.15);color:#f59e0b">Pending</span>';
  container.innerHTML+=`<div class="submission-card"><div class="submission-header"><div class="student-info"><div class="student-avatar">${initial}</div><div><strong>${studentInfo.name}</strong><br><small style="opacity:0.6">${studentInfo.email}</small></div></div><div style="text-align:right">${s.marks_obtained!==null&&s.marks_obtained!==undefined?`<div class="score-display">${s.marks_obtained}/${assign.max_marks||100}</div>`:""}${statusBadge}</div></div><div style="margin-bottom:10px"><a href="${s.file_url}" target="_blank" class="btn btn-secondary"><i class="fa-solid fa-download"></i> Download: ${s.file_name}</a></div><small style="opacity:0.5">Submitted: ${s.submitted_at?new Date(s.submitted_at).toLocaleString():""}</small>${s.feedback?`<p style="margin-top:10px"><strong>Feedback:</strong> ${s.feedback}</p>`:""}<div class="eval-section" id="eval${idx}"><div style="display:flex;gap:15px;align-items:end"><div class="form-group" style="flex:1;margin-bottom:0"><label>Marks (out of ${assign.max_marks||100})</label><input type="number" id="marks${idx}" value="${s.marks_obtained||''}" min="0" max="${assign.max_marks||100}"></div><div class="form-group" style="flex:2;margin-bottom:0"><label>Feedback</label><input type="text" id="feedback${idx}" value="${s.feedback||''}" placeholder="Optional feedback"></div><button class="btn btn-primary" onclick="evaluate(${idx},'${s.id}')"><i class="fa-solid fa-check"></i> Save</button></div></div><button class="btn btn-secondary mt-2" onclick="document.getElementById('eval${idx}').classList.toggle('show')"><i class="fa-solid fa-pen"></i> Evaluate</button></div>`;
});
document.getElementById("totalSubs").innerText=submissions.length;
document.getElementById("evaluated").innerText=evaluatedCount;
document.getElementById("pending").innerText=submissions.length-evaluatedCount;
document.getElementById("avgMarks").innerText=evaluatedCount>0?Math.round(totalMarks/evaluatedCount):0;
window.evaluate=async function(idx,subId){
  const marks=parseInt(document.getElementById("marks"+idx).value);
  const feedback=document.getElementById("feedback"+idx).value.trim();
  if(isNaN(marks)){alert("Enter marks");return}
  const{error}=await supabase.from("assignment_submissions").update({marks_obtained:marks,feedback:feedback,evaluated_at:new Date().toISOString(),evaluated_by:user.id}).eq("id",subId);
  if(error){alert("Failed: "+error.message);return}
  alert("Evaluation saved!");
  location.reload();
};
document.getElementById("menuIcon").addEventListener("click",function(){document.getElementById("menuDropdown").classList.toggle("show-menu")});
document.getElementById("logoutBtn").addEventListener("click",async function(e){e.preventDefault();await supabase.auth.signOut();window.location.href="../login.html"});
document.getElementById("logoutNavBtn").addEventListener("click",async function(e){e.preventDefault();await supabase.auth.signOut();window.location.href="../login.html"});
document.getElementById("logoBtn").addEventListener("click",function(){window.location.href="../teacher-dashboard.html"});
});
</script>
</body>
</html>
