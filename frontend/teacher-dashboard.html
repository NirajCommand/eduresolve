<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teacher Dashboard | EduResolve</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="teacher_style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="theme.js"></script>
</head>

<body>

<!-- ================= NAVBAR ================= -->

<nav class="navbar-custom">
  <div class="logo">
    <i class="fa-solid fa-graduation-cap"></i> EduResolve
  </div>

  <div class="nav-center">
    <a href="#">Account</a>
    <a href="#">My Courses</a>
    <a href="#">Search</a>
  </div>

  <div class="nav-right">
    <button id="modeBtn" class="mode-btn">
      <i class="fa-solid fa-moon"></i>
    </button>
    <button id="logoutNavBtn" class="logout-nav-btn">
      <i class="fa-solid fa-right-from-bracket"></i>
    </button>

    <div class="menu">
      <i class="fa-solid fa-bars" id="menuIcon"></i>
      <div class="menu-dropdown" id="menuDropdown">
        <a href="#">Profile</a>
        <a href="#">Registered Courses</a>
        <a href="#">Language</a>
        <a href="#" id="logoutBtn">Logout</a>
      </div>
    </div>
  </div>
</nav>

<!-- ================= WELCOME ================= -->

<div class="welcome-box">
  <div>
    <h3 id="teacherName">Welcome</h3>
  </div>
  <div class="welcome-right">
    <h6 id="teacherInstitution"></h6>
    <p id="teacherDate"></p>
  </div>
</div>

<!-- ================= MAIN ================= -->

<div class="main-container">

  <!-- LEFT 30% -->
  <div class="updates-panel">
    <h4>Announcements by HOD</h4>
    <div id="hodAnnouncements">Loading...</div>
  </div>

  <!-- RIGHT 70% -->
  <div class="right-content">

    <div class="actions-grid">

      <div class="card-box" onclick="window.location.href='teacher-teams.html'">
        <i class="fa-solid fa-users"></i>
        <h5>Teams</h5>
      </div>

      <div class="card-box" onclick="window.location.href='teacher_queries.html'">
<i class="fa-solid fa-comments"></i>
<h5>Student Queries</h5>
</div>

<div class="card-box" onclick="window.location.href='teacher_feedback.html'">
<i class="fa-solid fa-star"></i>
<h5>Solution Feedback</h5>
</div>

      <div class="card-box" onclick="window.location.href='study-material/teacher-materials.html'">
        <i class="fa-solid fa-book"></i>
        <h5>Study Materials</h5>
      </div>

      <div class="card-box" onclick="window.location.href='quiz/teacher-quiz-list.html'">
        <i class="fa-solid fa-pen"></i>
        <h5>My Quizzes</h5>
      </div>

      <div class="card-box" onclick="window.location.href='assignment/teacher-assignment-list.html'">
        <i class="fa-solid fa-file-lines"></i>
        <h5>Assignments</h5>
      </div>

      <div class="card-box" onclick="window.location.href='coding-exam/teacher-exam-list.html'">
        <i class="fa-solid fa-laptop-code"></i>
        <h5>Coding Exams</h5>
      </div>

      <div class="card-box">
        <i class="fa-solid fa-bell"></i>
        <h5>Notifications</h5>
      </div>

    </div>

    <!-- TEACHER ANNOUNCEMENT FORM -->

    <div class="announcement-section mt-5">
      <h4>Create Announcement for Team</h4>

      <form id="announcementForm">

        <div class="mb-3">
          <label class="form-label">Select Team</label>
          <select class="form-select" id="teamSelect" required>
            <option value="">Select team</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Title</label>
          <input type="text" class="form-control"
                 id="announcementTitle" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea class="form-control"
                    rows="4"
                    id="announcementContent" required></textarea>
        </div>

        <button type="submit"
                class="btn btn-primary w-100">
          Post Announcement
        </button>

      </form>
    </div>

  </div>
</div>
<script>

document.addEventListener("DOMContentLoaded", async function(){

const SUPABASE_URL = "https://zwpjavmrgveckswnobhg.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3cGphdm1yZ3ZlY2tzd25vYmhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NDg0MzcsImV4cCI6MjA4ODAyNDQzN30.jZUB2M-mqpWC1vkiMyVJFZU9ez0wKXsiTPbg8ndNITw";

const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

/* ROLE PROTECTION */

const { data:{ user } } = await supabase.auth.getUser();

if(!user){
  window.location.href="login.html";
  return;
}

const { data: profile } = await supabase
.from("users")
.select("name,institution,role")
.eq("id",user.id)
.single();

if(!profile || profile.role !== "teacher"){

  if(profile?.role==="student")
    window.location.href="student-dashboard.html";

  if(profile?.role==="hod")
    window.location.href="hod-dashboard.html";

  return;
}

/* PROFILE */

document.getElementById("teacherName").innerText =
"Welcome, "+profile.name;

document.getElementById("teacherInstitution").innerText =
profile.institution;

document.getElementById("teacherDate").innerText =
new Date().toLocaleDateString(
"en-IN",
{weekday:"long",year:"numeric",month:"long",day:"numeric"}
);

/* MENU */

document.getElementById("menuIcon")
.addEventListener("click",function(){
document.getElementById("menuDropdown")
.classList.toggle("show-menu");
});

document.getElementById("logoutBtn")
.addEventListener("click",async function(e){
e.preventDefault();
await supabase.auth.signOut();
window.location.href="login.html";
});

document.getElementById("logoutNavBtn")
.addEventListener("click",async function(e){
e.preventDefault();
await supabase.auth.signOut();
window.location.href="login.html";
});

/* LOAD HOD ANNOUNCEMENTS */

const { data: hodAnnouncements, error: hodError } =
await supabase
.from("announcements")
.select("title,description,created_at")
.eq("role","hod")
.eq("institution",profile.institution)
.order("created_at",{ascending:false});

const hodContainer =
document.getElementById("hodAnnouncements");

hodContainer.innerHTML="";

if(hodError){
console.log(hodError);
hodContainer.innerHTML="Error loading announcements";
return;
}

if(!hodAnnouncements || hodAnnouncements.length===0){

hodContainer.innerHTML="No announcements yet.";

}else{

hodAnnouncements.forEach(a=>{

hodContainer.innerHTML+=`
<div style="margin-bottom:18px">
<strong>${a.title}</strong>
<p>${a.description}</p>
<small>${new Date(a.created_at).toLocaleString()}</small>
</div>
`;

});

}

/* LOAD TEACHER TEAMS */

const { data: teams, error: teamError } =
await supabase
.from("teams")
.select("id,name")
.eq("teacher_id",user.id);

if(teamError){
console.log(teamError);
return;
}

const select =
document.getElementById("teamSelect");

teams?.forEach(team=>{
const option=document.createElement("option");
option.value=team.id;
option.textContent=team.name;
select.appendChild(option);
});

/* POST ANNOUNCEMENT */

document.getElementById("announcementForm")
.addEventListener("submit",async function(e){

e.preventDefault();

const teamId =
document.getElementById("teamSelect").value;

const title =
document.getElementById("announcementTitle").value.trim();

const description =
document.getElementById("announcementContent").value.trim();

if(!teamId){
alert("Select team first");
return;
}

if(!title || !description){
alert("All fields required");
return;
}

const { error } =
await supabase
.from("announcements")
.insert([{
title:title,
description:description,
created_by:user.id,
team_id:teamId,
institution:profile.institution,
role:"teacher"
}]);

if(error){
console.log(error);
alert("Announcement failed");
return;
}

alert("Announcement posted successfully");

document.getElementById("announcementForm").reset();

});

});

</script>


</body>
</html>
