<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile | EduResolve</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  transition:0.25s;
}

/* MODES */

body.light-mode{
  background:#f5f7fb;
  color:#000;
}

body.dark-mode{
  background:#121212;
  color:#fff;
}

/* NAVBAR */

.navbar-custom{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:inherit;
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(0,0,0,0.05);
}

.logo{
  font-size:20px;
  font-weight:600;
  cursor:pointer;
}

.nav-right{
  display:flex;
  align-items:center;
  gap:15px;
}

.mode-btn{
  border:none;
  background:none;
  font-size:18px;
  cursor:pointer;
}

/* CARD */

.profile-container{
  max-width:600px;
  margin:50px auto;
}

.card-box{
  padding:25px;
  border-radius:12px;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(15px);
  box-shadow:0 8px 25px rgba(0,0,0,0.1);
  animation:fadeUp 0.6s ease;
}

body.dark-mode .card-box{
  background:rgba(255,255,255,0.05);
}

/* ANIMATION */

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* HEADER */

.profile-header{
  text-align:center;
  margin-bottom:20px;
}

.avatar{
  width:70px;
  height:70px;
  border-radius:50%;
  background:#007bff;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  margin:0 auto 10px;
  transition:0.3s;
}

.avatar:hover{
  transform:scale(1.1) rotate(5deg);
}

/* INPUT */

input{
  width:100%;
  padding:10px;
  margin-top:5px;
  margin-bottom:15px;
  border-radius:6px;
  border:1px solid #ddd;
}

body.dark-mode input{
  background:#1e1e1e;
  color:#fff;
  border:1px solid #444;
}

/* BUTTON */

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#007bff;
  color:#fff;
  cursor:pointer;
}

button:hover{
  transform:scale(1.02);
  background:#0056b3;
}

</style>
</head>

<body>

<div class="navbar-custom">

  <div class="logo" onclick="goDashboard()">EduResolve</div>

  <div class="nav-right">

    <button class="btn btn-sm btn-primary" onclick="goDashboard()">
      Dashboard
    </button>

    <button class="mode-btn" onclick="toggleMode()" id="modeIcon">
      <i class="fa-solid fa-moon"></i>
    </button>

  </div>

</div>

<div class="profile-container">

  <div class="card-box">

    <div class="profile-header">
      <div class="avatar" id="avatar">U</div>
      <h4 id="displayName">User</h4>
      <p id="displayRole"></p>
    </div>

    <form id="profileForm">

      <label>Name</label>
      <input type="text" id="name">

      <label>Email</label>
      <input type="email" id="email" disabled>

      <label>Role</label>
      <input type="text" id="role" disabled>

      <label>Institution</label>
      <input type="text" id="institution" disabled>

      <button type="submit">Update Profile</button>

    </form>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const { createClient } = supabase;
const client = createClient("https://zwpjavmrgveckswnobhg.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3cGphdm1yZ3ZlY2tzd25vYmhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NDg0MzcsImV4cCI6MjA4ODAyNDQzN30.jZUB2M-mqpWC1vkiMyVJFZU9ez0wKXsiTPbg8ndNITw");

let userId = null;
let userRole = "";

/* ===== MODE SYSTEM ===== */

function loadMode(){
  const mode = localStorage.getItem("mode") || "light";
  document.body.classList.add(mode + "-mode");
  updateIcon(mode);
}

function toggleMode(){
  const isDark = document.body.classList.contains("dark-mode");

  document.body.classList.toggle("dark-mode");
  document.body.classList.toggle("light-mode");

  const newMode = isDark ? "light" : "dark";
  localStorage.setItem("mode", newMode);

  updateIcon(newMode);
}

function updateIcon(mode){
  const icon = document.getElementById("modeIcon");
  icon.innerHTML = mode === "dark"
    ? '<i class="fa-solid fa-sun"></i>'
    : '<i class="fa-solid fa-moon"></i>';
}

/* ===== NAV ===== */

function goDashboard(){
  if(userRole === "student"){
    window.location.href = "student-dashboard.html";
  }
  else if(userRole === "teacher"){
    window.location.href = "teacher-dashboard.html";
  }
  else{
    window.location.href = "hod-dashboard.html";
  }
}

/* ===== PROFILE ===== */

async function loadProfile(){

  const { data:{ user } } = await client.auth.getUser();

  if(!user){
    window.location.href = "login.html";
    return;
  }

  userId = user.id;

  const { data: profile } = await client
    .from("users")
    .select("name, role, institution")
    .eq("id", user.id)
    .single();

  userRole = profile.role;

  document.getElementById("name").value = profile.name;
  document.getElementById("email").value = user.email;
  document.getElementById("role").value = profile.role;
  document.getElementById("institution").value = profile.institution;

  document.getElementById("displayName").innerText = profile.name;
  document.getElementById("displayRole").innerText = profile.role;

  document.getElementById("avatar").innerText =
    profile.name.charAt(0).toUpperCase();
}

document.getElementById("profileForm")
.addEventListener("submit", async function(e){

  e.preventDefault();

  const name = document.getElementById("name").value.trim();

  if(!name){
    alert("Name required");
    return;
  }

  await client
    .from("users")
    .update({ name })
    .eq("id", userId);

  alert("Profile updated");
  loadProfile();
});

/* INIT */

loadMode();
loadProfile();
</script>

</body>
</html>
