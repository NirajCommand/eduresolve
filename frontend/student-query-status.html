<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Query Status</title>

<link rel="stylesheet" href="student_query.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="theme.js"></script>

</head>

<body>

<nav class="navbar-custom">

<div class="logo"
onclick="window.location.href='student-dashboard.html'">
EduResolve
</div>

<div class="nav-center">
<a href="student-dashboard.html">Dashboard</a>
<a href="student-teams.html">Teams</a>
</div>

</nav>

<div class="page-container">

<h2 class="page-title">My Queries</h2>

<div id="queriesContainer"></div>

</div>

<script>

/* ===== GLOBAL CLIENT ===== */

const { createClient } = supabase;
const client = createClient("https://zwpjavmrgveckswnobhg.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3cGphdm1yZ3ZlY2tzd25vYmhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NDg0MzcsImV4cCI6MjA4ODAyNDQzN30.jZUB2M-mqpWC1vkiMyVJFZU9ez0wKXsiTPbg8ndNITw");


/* ===== LOAD ===== */

document.addEventListener("DOMContentLoaded", async function(){

const { data:{ user } } = await client.auth.getUser();

if(!user){
window.location.href="login.html";
return;
}

const { data:queries, error } = await client
.from("queries")
.select("*")
.eq("student_id", user.id)
.order("created_at", {ascending:false});

if(error){
console.log(error);
return;
}

const container = document.getElementById("queriesContainer");
container.innerHTML = "";

/* RENDER */

queries?.forEach(q => {

let html = `
<div class="query-card">

<div class="query-title">${q.title}</div>

<div class="query-meta">
${new Date(q.created_at).toLocaleString()}
</div>

<div class="query-desc">
${q.description}
</div>

<div class="query-status">
Status:
<span class="${
q.status === "answered"
? "status-solved"
: "status-pending"
}">
${q.status}
</span>
</div>
`;

/* SHOW SOLUTION */

if(q.status === "answered"){

html += `
<div class="solution-box">
<strong>Teacher Solution</strong>
<p>${q.solution || "No solution added yet"}</p>
</div>
`;

/* IF ALREADY GIVEN FEEDBACK */

if(q.feedback_text){

html += `
<div class="feedback-box">
<strong>Your Feedback</strong>
<p>${q.feedback_text}</p>
<p>Rating: ${q.feedback_rating || "N/A"} ⭐</p>
</div>
`;

} else {

/* SHOW INPUT */

html += `
<div class="feedback-box">

<textarea
placeholder="Write feedback..."
id="fb-${q.id}">
</textarea>

<select id="rating-${q.id}">
<option value="">Rating</option>
<option value="1">1 ⭐</option>
<option value="2">2 ⭐</option>
<option value="3">3 ⭐</option>
<option value="4">4 ⭐</option>
<option value="5">5 ⭐</option>
</select>

<button
class="feedback-btn"
onclick="submitFeedback('${q.id}')">
Submit Feedback
</button>

</div>
`;

}

}

html += `</div>`;

container.innerHTML += html;

});

});


/* ===== FEEDBACK FUNCTION ===== */

async function submitFeedback(queryId){

const text = document
.getElementById("fb-"+queryId)
.value.trim();

const rating = document
.getElementById("rating-"+queryId)
.value;

if(!text || !rating){
alert("Write feedback and select rating");
return;
}

/* UPDATE CORRECT COLUMNS */

const { error } = await client
.from("queries")
.update({
  feedback_text: text,
  feedback_rating: rating
})
.eq("id", queryId);

if(error){
console.log(error);
alert("Feedback failed");
return;
}

alert("Feedback submitted");

/* RELOAD PAGE */

location.reload();

}

</script>

</body>
</html>
