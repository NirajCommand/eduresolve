<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Solution Feedback | EduResolve</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Segoe UI, Arial;
background:#0f172a;
color:white;
}



.navbar-custom{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 50px;
background:#020617;
}

.logo{
font-size:20px;
font-weight:600;
color:#facc15;
cursor:pointer;
}

.nav-center{
display:flex;
gap:30px;
}

.nav-center a{
color:#cbd5f5;
text-decoration:none;
font-size:14px;
}

.nav-center a:hover{
color:white;
}



.page-container{
max-width:1000px;
margin:auto;
padding:40px;
}

h2{
margin-bottom:30px;
}



.feedback-card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

.feedback-card h4{
margin:0 0 5px 0;
}

.meta{
font-size:12px;
color:#94a3b8;
margin-bottom:10px;
}

.solution{
background:#020617;
padding:12px;
border-radius:8px;
margin-top:10px;
}

.feedback{
margin-top:10px;
color:#22c55e;
}

.rating{
margin-top:8px;
color:#facc15;
}

.no-data{
opacity:0.7;
}

</style>
<script src="theme.js"></script>
</head>

<body>

<nav class="navbar-custom">

<div class="logo"
onclick="window.location.href='teacher-dashboard.html'">
<i class="fa-solid fa-graduation-cap"></i> EduResolve
</div>

<div class="nav-center">
<a href="teacher-dashboard.html">Dashboard</a>
<a href="teacher-teams.html">Teams</a>
<a href="teacher_queries.html">Queries</a>
</div>

</nav>


<div class="page-container">

<h2>Solution Feedback</h2>

<div id="feedbackContainer"></div>

</div>


<script>

const SUPABASE_URL = "https://zwpjavmrgveckswnobhg.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3cGphdm1yZ3ZlY2tzd25vYmhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NDg0MzcsImV4cCI6MjA4ODAyNDQzN30.jZUB2M-mqpWC1vkiMyVJFZU9ez0wKXsiTPbg8ndNITw";

const { createClient } = supabase;
const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);


document.addEventListener("DOMContentLoaded", async function(){

const { data:{ user } } = await client.auth.getUser();

if(!user){
window.location.href="login.html";
return;
}



const { data:teams } = await client
.from("teams")
.select("id");

const teamIds = teams
.filter(t => true)   
.map(t => t.id);



const { data:queries } = await client
.from("queries")
.select(`
title,
solution,
feedback_text,
feedback_rating,
created_at,
team_id,
teams(name)
`)
.in("team_id",teamIds)
.not("feedback_text","is",null)
.order("created_at",{ascending:false});

const container=document.getElementById("feedbackContainer");

container.innerHTML="";

if(!queries || queries.length===0){

container.innerHTML=
'<p class="no-data">No feedback available yet.</p>';

return;
}

queries.forEach(q=>{

container.innerHTML+=`

<div class="feedback-card">

<h4>${q.title}</h4>

<div class="meta">
Team: ${q.teams?.name || "Unknown"} |
${new Date(q.created_at).toLocaleDateString()}
</div>

<div class="solution">
<strong>Your Solution</strong>
<p>${q.solution || "No solution stored"}</p>
</div>

<div class="feedback">
<strong>Student Feedback</strong>
<p>${q.feedback_text}</p>
</div>

<div class="rating">
Rating: ${q.feedback_rating || "Not rated"}
</div>

</div>

`;

});

});

</script>

</body>
</html>
