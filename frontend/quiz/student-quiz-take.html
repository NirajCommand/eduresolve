<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Take Quiz | EduResolve</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{margin:0;font-family:'Segoe UI',sans-serif;transition:0.3s ease}
body.dark-mode{background:#0f172a;color:#fff}
body.light-mode{background:#f4f6fa;color:#111827}
.navbar-custom{height:65px;padding:0 60px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,#111827,#1f2937);box-shadow:0 6px 18px rgba(0,0,0,0.4);position:fixed;top:0;left:0;right:0;z-index:1000}
body.light-mode .navbar-custom{background:#fff;box-shadow:0 6px 20px rgba(0,0,0,0.08)}
.logo{font-size:20px;font-weight:600;color:#f4c430;cursor:pointer}
.nav-center{display:flex;gap:35px}
.nav-center a{color:#d1d5db;text-decoration:none;font-size:14px}
body.light-mode .nav-center a{color:#1f2937}
.nav-right{display:flex;align-items:center;gap:20px}
.mode-btn{width:36px;height:36px;border-radius:8px;border:none;background:#1e293b;color:#fff;cursor:pointer}
.logout-nav-btn{width:36px;height:36px;border-radius:8px;border:none;background:#1e293b;color:#fff;cursor:pointer}
.menu{position:relative}
.menu-dropdown{display:none;position:absolute;right:0;top:45px;width:160px;background:#1e293b;border-radius:10px;box-shadow:0 10px 25px rgba(0,0,0,0.4)}
body.light-mode .menu-dropdown{background:#fff;box-shadow:0 10px 25px rgba(0,0,0,0.1)}
.menu-dropdown a{display:block;padding:12px 16px;text-decoration:none;color:#fff;font-size:14px}
body.light-mode .menu-dropdown a{color:#1f2937}
.menu-dropdown a:hover{background:#2f6df6}
.show-menu{display:block}
.welcome-box{margin:90px 60px 30px;padding:30px 40px;border-radius:18px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,#2f6df6,#1e4fc4);box-shadow:0 12px 35px rgba(47,109,246,0.4)}
.welcome-box h3{margin:0;font-weight:600}
.welcome-right{text-align:right}
.welcome-right h6{margin:0 0 4px;opacity:0.9}
.welcome-right p{margin:0;font-size:13px;opacity:0.7}
.main-container{padding:20px 60px 80px;max-width:1400px;margin:auto}
.exam-timer{position:fixed;top:80px;right:30px;padding:15px 25px;border-radius:12px;background:linear-gradient(135deg,#1e293b,#0f172a);color:#fff;font-size:24px;font-weight:700;box-shadow:0 10px 30px rgba(0,0,0,0.4);z-index:999;display:flex;align-items:center;gap:10px}
.exam-timer.warning{background:linear-gradient(135deg,#f59e0b,#d97706)}
.exam-timer.danger{background:linear-gradient(135deg,#ef4444,#dc2626);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.question-card{padding:30px;border-radius:16px;margin-bottom:25px}
body.dark-mode .question-card{background:#1e293b;box-shadow:0 12px 30px rgba(0,0,0,0.3)}
body.light-mode .question-card{background:#fff;box-shadow:0 12px 30px rgba(0,0,0,0.08)}
.question-card h4{margin:0 0 20px;font-size:18px}
.question-img{max-width:100%;border-radius:10px;margin-bottom:15px}
.option-label{display:flex;align-items:center;gap:12px;padding:14px 18px;border-radius:10px;border:2px solid rgba(47,109,246,0.15);cursor:pointer;transition:0.3s;margin-bottom:10px}
body.dark-mode .option-label{background:#0f172a}
body.light-mode .option-label{background:#f8fafc}
.option-label:hover{border-color:#2f6df6}
.option-label.selected{border-color:#2f6df6;background:rgba(47,109,246,0.1)}
.option-label input[type="radio"]{width:20px;height:20px;accent-color:#2f6df6}
.option-label img{max-width:80px;max-height:80px;border-radius:8px;object-fit:cover}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:2000;backdrop-filter:blur(5px)}
.modal-box{padding:40px;border-radius:20px;max-width:500px;width:90%;text-align:center}
body.dark-mode .modal-box{background:#1e293b;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
body.light-mode .modal-box{background:#fff;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
.modal-box h3{margin:0 0 10px;font-size:22px}
.modal-box p{margin:0 0 25px;opacity:0.7;font-size:14px}
.btn-primary{background:linear-gradient(135deg,#2f6df6,#1e4fc4);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-weight:600;cursor:pointer}
.btn-primary:hover{box-shadow:0 10px 25px rgba(47,109,246,0.4)}
.btn-success{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-weight:600;cursor:pointer}
.btn-danger{background:rgba(239,68,68,0.15);color:#ef4444;border:none;padding:10px 20px;border-radius:10px;font-weight:600;cursor:pointer}
@media(max-width:768px){.navbar-custom{padding:0 20px}.nav-center{display:none}.welcome-box{margin:90px 20px 20px;padding:20px;flex-direction:column;text-align:center;gap:15px}.main-container{padding:20px}.exam-timer{position:static;margin-bottom:20px;text-align:center;justify-content:center}}
</style>
<script src="../theme.js"></script>
</head>
<body>
<nav class="navbar-custom">
  <div class="logo" id="logoBtn"><i class="fa-solid fa-graduation-cap"></i> EduResolve</div>
  <div class="nav-center">
    <a href="../student-dashboard.html">Dashboard</a>
    <a href="student-quiz-list.html">My Quizzes</a>
  </div>
  <div class="nav-right">
    <button id="modeBtn" class="mode-btn"><i class="fa-solid fa-moon"></i></button>
    <button id="logoutNavBtn" class="logout-nav-btn"><i class="fa-solid fa-right-from-bracket"></i></button>
    <div class="menu">
      <i class="fa-solid fa-bars" id="menuIcon"></i>
      <div class="menu-dropdown" id="menuDropdown">
        <a href="../student-dashboard.html">Dashboard</a>
        <a href="#" id="logoutBtn">Logout</a>
      </div>
    </div>
  </div>
</nav>
<div class="welcome-box">
  <div><h3 id="quizTitle">Loading...</h3><p id="quizDesc"></p></div>
  <div class="welcome-right"><h6 id="studentName"></h6><p id="todayDate"></p></div>
</div>
<div class="main-container">
  <div class="exam-timer" id="timer"><i class="fa-solid fa-clock"></i> <span id="timerDisplay">00:00</span></div>
  <div id="questionsContainer"></div>
  <div style="display:flex;gap:15px;margin-top:30px">
    <button class="btn btn-success flex-fill" onclick="submitQuiz()"><i class="fa-solid fa-paper-plane"></i> Submit Quiz</button>
  </div>
</div>
<div class="modal-overlay" id="startModal">
  <div class="modal-box">
    <h3 id="modalTitle">Ready to start?</h3>
    <p id="modalDesc"></p>
    <div style="display:flex;gap:15px;justify-content:center">
      <button class="btn btn-primary" onclick="startQuiz()"><i class="fa-solid fa-play"></i> Start Quiz</button>
      <button class="btn btn-danger" onclick="window.location.href='student-quiz-list.html'"><i class="fa-solid fa-xmark"></i> Cancel</button>
    </div>
  </div>
</div>
<script>
document.addEventListener("DOMContentLoaded",async function(){
const SUPABASE_URL="https://zwpjavmrgveckswnobhg.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3cGphdm1yZ3ZlY2tzd25vYmhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NDg0MzcsImV4cCI6MjA4ODAyNDQzN30.jZUB2M-mqpWC1vkiMyVJFZU9ez0wKXsiTPbg8ndNITw";
window.supabaseClient=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const supabase=window.supabaseClient;
const{data:{user}}=await supabase.auth.getUser();
if(!user){window.location.href="../login.html";return}
const{data:profile}=await supabase.from("users").select("name,institution,role").eq("id",user.id).single();
if(!profile||profile.role!=="student"){window.location.href="../login.html";return}
document.getElementById("studentName").innerText=profile.name;
document.getElementById("todayDate").innerText=new Date().toLocaleDateString("en-IN",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
const params=new URLSearchParams(window.location.search);
const quizId=params.get("id");
if(!quizId){alert("No quiz selected");window.location.href="student-quiz-list.html";return}
const{data:quiz}=await supabase.from("quizzes").select("*").eq("id",quizId).eq("status","published").single();
if(!quiz){alert("Quiz not found");window.location.href="student-quiz-list.html";return}
document.getElementById("quizTitle").innerText=quiz.title;
document.getElementById("quizDesc").innerText=quiz.description||"";
document.getElementById("modalTitle").innerText=quiz.title;
document.getElementById("modalDesc").innerText=`${quiz.time_limit||30} minutes | ${(await supabase.from("quiz_questions").select("*",{count:"exact",head:true}).eq("quiz_id",quizId)).count||0} questions`;
let questions=[];
let submissionId=null;
let timerInterval=null;
let timeLeft=0;
window.startQuiz=async function(){
  document.getElementById("startModal").style.display="none";
  const{data:questionsData}=await supabase.from("quiz_questions").select("*").eq("quiz_id",quizId).order("order_index");
  questions=quiz.shuffle_questions&&questionsData?questionsData.sort(()=>Math.random()-0.5):questionsData||[];
  const{data:newSub}=await supabase.from("quiz_submissions").insert({quiz_id:quizId,student_id:user.id,status:"in_progress",attempt_number:1}).select().single();
  submissionId=newSub.id;
  timeLeft=(quiz.time_limit||30)*60;
  startTimer();
  renderQuestions();
};
function startTimer(){
  updateTimerDisplay();
  timerInterval=setInterval(()=>{
    timeLeft--;
    updateTimerDisplay();
    if(timeLeft<=0){clearInterval(timerInterval);alert("Time is up!");submitQuiz()}
    if(timeLeft<=300)document.getElementById("timer").className="exam-timer danger";
    else if(timeLeft<=600)document.getElementById("timer").className="exam-timer warning";
  },1000);
}
function updateTimerDisplay(){
  const m=Math.floor(timeLeft/60);
  const s=timeLeft%60;
  document.getElementById("timerDisplay").innerText=`${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}
function renderQuestions(){
  const container=document.getElementById("questionsContainer");
  container.innerHTML="";
  questions.forEach((q,i)=>{
    let imgHtml=q.question_image_url?`<img src="${q.question_image_url}" class="question-img">`:"";
    container.innerHTML+=`<div class="question-card"><h4>Question ${i+1}: ${q.question_text||""}</h4>${imgHtml}<div class="options"><label class="option-label" onclick="selectOption(this,${i},'a')"><input type="radio" name="q${i}" value="a">${q.option_a_text||""}${q.option_a_image_url?`<img src="${q.option_a_image_url}">`:""}</label><label class="option-label" onclick="selectOption(this,${i},'b')"><input type="radio" name="q${i}" value="b">${q.option_b_text||""}${q.option_b_image_url?`<img src="${q.option_b_image_url}">`:""}</label><label class="option-label" onclick="selectOption(this,${i},'c')"><input type="radio" name="q${i}" value="c">${q.option_c_text||""}${q.option_c_image_url?`<img src="${q.option_c_image_url}">`:""}</label><label class="option-label" onclick="selectOption(this,${i},'d')"><input type="radio" name="q${i}" value="d">${q.option_d_text||""}${q.option_d_image_url?`<img src="${q.option_d_image_url}">`:""}</label></div></div>`;
  });
}
window.selectOption=function(label,idx,val){
  const card=label.closest(".question-card");
  card.querySelectorAll(".option-label").forEach(l=>l.classList.remove("selected"));
  label.classList.add("selected");
  label.querySelector("input").checked=true;
};
window.submitQuiz=async function(){
  if(!confirm("Submit your answers?"))return;
  clearInterval(timerInterval);
  let score=0;
  let maxScore=0;
  for(let i=0;i<questions.length;i++){
    const q=questions[i];
    maxScore+=q.points||1;
    const selected=document.querySelector(`input[name="q${i}"]:checked`);
    const answer=selected?selected.value:null;
    const isCorrect=answer===q.correct_answer;
    if(isCorrect)score+=q.points||1;
    await window.supabaseClient.from("quiz_answers").insert({submission_id:submissionId,question_id:q.id,selected_answer:answer,is_correct:isCorrect,points_earned:isCorrect?(q.points||1):0});
  }
  await window.supabaseClient.from("quiz_submissions").update({status:"submitted",score:score,max_score:maxScore,submitted_at:new Date().toISOString()}).eq("id",submissionId);
  alert(`Quiz submitted! Score: ${score}/${maxScore}`);
  window.location.href=`student-quiz-results.html?id=${submissionId}`;
};
document.getElementById("menuIcon").addEventListener("click",function(){document.getElementById("menuDropdown").classList.toggle("show-menu")});
document.getElementById("logoutBtn").addEventListener("click",async function(e){e.preventDefault();await window.supabaseClient.auth.signOut();window.location.href="../login.html"});
document.getElementById("logoutNavBtn").addEventListener("click",async function(e){e.preventDefault();await window.supabaseClient.auth.signOut();window.location.href="../login.html"});
document.getElementById("logoBtn").addEventListener("click",function(){window.location.href="../student-dashboard.html"});
});
</script>
</body>
</html>
