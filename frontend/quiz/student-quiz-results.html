<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz Results | EduResolve</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{margin:0;font-family:'Segoe UI',sans-serif;transition:0.3s ease}
body.dark-mode{background:#0f172a;color:#fff}
body.light-mode{background:#f4f6fa;color:#111827}
.navbar-custom{height:65px;padding:0 60px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,#111827,#1f2937);box-shadow:0 6px 18px rgba(0,0,0,0.4);position:fixed;top:0;left:0;right:0;z-index:1000}
body.light-mode .navbar-custom{background:#fff;box-shadow:0 6px 20px rgba(0,0,0,0.08)}
.logo{font-size:20px;font-weight:600;color:#f4c430;cursor:pointer}
.nav-center{display:flex;gap:35px}
.nav-center a{color:#d1d5db;text-decoration:none;font-size:14px}
body.light-mode .nav-center a{color:#1f2937}
.nav-right{display:flex;align-items:center;gap:20px}
.mode-btn{width:36px;height:36px;border-radius:8px;border:none;background:#1e293b;color:#fff;cursor:pointer}
.logout-nav-btn{width:36px;height:36px;border-radius:8px;border:none;background:#1e293b;color:#fff;cursor:pointer}
.menu{position:relative}
.menu-dropdown{display:none;position:absolute;right:0;top:45px;width:160px;background:#1e293b;border-radius:10px;box-shadow:0 10px 25px rgba(0,0,0,0.4)}
body.light-mode .menu-dropdown{background:#fff;box-shadow:0 10px 25px rgba(0,0,0,0.1)}
.menu-dropdown a{display:block;padding:12px 16px;text-decoration:none;color:#fff;font-size:14px}
body.light-mode .menu-dropdown a{color:#1f2937}
.menu-dropdown a:hover{background:#2f6df6}
.show-menu{display:block}
.welcome-box{margin:90px 60px 30px;padding:30px 40px;border-radius:18px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,#2f6df6,#1e4fc4);box-shadow:0 12px 35px rgba(47,109,246,0.4)}
.welcome-box h3{margin:0;font-weight:600}
.welcome-right{text-align:right}
.welcome-right h6{margin:0 0 4px;opacity:0.9}
.welcome-right p{margin:0;font-size:13px;opacity:0.7}
.main-container{padding:20px 60px 80px;max-width:1400px;margin:auto}
.stats-box{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:40px}
.stat-card{padding:25px;border-radius:16px;text-align:center}
body.dark-mode .stat-card{background:#1e293b;box-shadow:0 12px 30px rgba(0,0,0,0.3)}
body.light-mode .stat-card{background:#fff;box-shadow:0 12px 30px rgba(0,0,0,0.08)}
.stat-card h3{margin:0 0 8px;font-size:32px;color:#2f6df6}
.stat-card p{margin:0;font-size:14px;opacity:0.7}
.question-card{padding:25px;border-radius:16px;margin-bottom:20px}
body.dark-mode .question-card{background:#1e293b;box-shadow:0 12px 30px rgba(0,0,0,0.3)}
body.light-mode .question-card{background:#fff;box-shadow:0 12px 30px rgba(0,0,0,0.08)}
.question-card h4{margin:0 0 10px}
.answer-review{padding:10px 15px;border-radius:8px;margin-top:10px}
.answer-review.correct{background:rgba(34,197,94,0.1);border-left:4px solid #22c55e}
.answer-review.incorrect{background:rgba(239,68,68,0.1);border-left:4px solid #ef4444}
.progress-bar{height:10px;border-radius:5px;background:rgba(47,109,246,0.15);overflow:hidden;margin:15px 0}
.progress-fill{height:100%;background:linear-gradient(90deg,#2f6df6,#1e4fc4);border-radius:5px}
.btn-primary{background:linear-gradient(135deg,#2f6df6,#1e4fc4);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-block}
@media(max-width:768px){.navbar-custom{padding:0 20px}.nav-center{display:none}.welcome-box{margin:90px 20px 20px;padding:20px;flex-direction:column;text-align:center;gap:15px}.main-container{padding:20px}}
</style>
<script src="../theme.js"></script>
</head>
<body>
<nav class="navbar-custom">
  <div class="logo" id="logoBtn"><i class="fa-solid fa-graduation-cap"></i> EduResolve</div>
  <div class="nav-center">
    <a href="../student-dashboard.html">Dashboard</a>
    <a href="student-quiz-list.html">My Quizzes</a>
  </div>
  <div class="nav-right">
    <button id="modeBtn" class="mode-btn"><i class="fa-solid fa-moon"></i></button>
    <button id="logoutNavBtn" class="logout-nav-btn"><i class="fa-solid fa-right-from-bracket"></i></button>
    <div class="menu">
      <i class="fa-solid fa-bars" id="menuIcon"></i>
      <div class="menu-dropdown" id="menuDropdown">
        <a href="../student-dashboard.html">Dashboard</a>
        <a href="#" id="logoutBtn">Logout</a>
      </div>
    </div>
  </div>
</nav>
<div class="welcome-box">
  <div><h3 id="quizTitle">Loading...</h3><p>Quiz Results</p></div>
  <div class="welcome-right"><h6 id="studentName"></h6><p id="todayDate"></p></div>
</div>
<div class="main-container">
  <div class="stats-box">
    <div class="stat-card"><h3 id="scoreDisplay">0/0</h3><p>Your Score</p></div>
    <div class="stat-card"><h3 id="pctDisplay">0%</h3><p>Percentage</p></div>
    <div class="stat-card"><h3 id="correctCount">0</h3><p>Correct</p></div>
    <div class="stat-card"><h3 id="incorrectCount">0</h3><p>Incorrect</p></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <h3><i class="fa-solid fa-list-check"></i> Question Review</h3>
  <div id="reviewContainer"></div>
  <div style="margin-top:30px">
    <a href="student-quiz-list.html" class="btn btn-primary"><i class="fa-solid fa-arrow-left"></i> Back to Quizzes</a>
  </div>
</div>
<script>
document.addEventListener("DOMContentLoaded",async function(){
const SUPABASE_URL="https://zwpjavmrgveckswnobhg.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3cGphdm1yZ3ZlY2tzd25vYmhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NDg0MzcsImV4cCI6MjA4ODAyNDQzN30.jZUB2M-mqpWC1vkiMyVJFZU9ez0wKXsiTPbg8ndNITw";
const supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const{data:{user}}=await supabase.auth.getUser();
if(!user){window.location.href="../login.html";return}
const{data:profile}=await supabase.from("users").select("name,institution,role").eq("id",user.id).single();
if(!profile||profile.role!=="student"){window.location.href="../login.html";return}
document.getElementById("studentName").innerText=profile.name;
document.getElementById("todayDate").innerText=new Date().toLocaleDateString("en-IN",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
const params=new URLSearchParams(window.location.search);
const submissionId=params.get("id");
if(!submissionId){alert("No submission found");window.location.href="student-quiz-list.html";return}
const{data:sub}=await supabase.from("quiz_submissions").select("*,quizzes(title,show_results)").eq("id",submissionId).single();
if(!sub){alert("Submission not found");window.location.href="student-quiz-list.html";return}
if(!sub.quizzes?.show_results&&sub.student_id!==user.id){alert("Results not available");window.location.href="student-quiz-list.html";return}
document.getElementById("quizTitle").innerText=sub.quizzes?.title||"Quiz Results";
const pct=sub.max_score>0?Math.round(sub.score/sub.max_score*100):0;
document.getElementById("scoreDisplay").innerText=`${sub.score}/${sub.max_score}`;
document.getElementById("pctDisplay").innerText=pct+"%";
document.getElementById("progressFill").style.width=pct+"%";
const{data:answers}=await supabase.from("quiz_answers").select("*,quiz_questions(question_text,question_image_url,correct_answer,points,option_a_text,option_b_text,option_c_text,option_d_text)").eq("submission_id",submissionId);
if(!answers||answers.length===0){document.getElementById("reviewContainer").innerHTML="<p>No answers recorded.</p>";return}
let correct=0,incorrect=0;
const container=document.getElementById("reviewContainer");
answers.forEach((a,i)=>{
  const isCorrect=a.is_correct;
  if(isCorrect)correct++;else incorrect++;
  const q=a.quiz_questions||{};
  const cls=isCorrect?"correct":"incorrect";
  const icon=isCorrect?"fa-check-circle":"fa-times-circle";
  container.innerHTML+=`<div class="question-card"><h4>Q${i+1}: ${q.question_text||"Unknown"}</h4><div class="answer-review ${cls}"><i class="fa-solid ${icon}"></i> <strong>Your answer:</strong> ${(a.selected_answer||"No answer").toUpperCase()} | <strong>Correct:</strong> ${(q.correct_answer||"?").toUpperCase()}</div></div>`;
});
document.getElementById("correctCount").innerText=correct;
document.getElementById("incorrectCount").innerText=incorrect;
document.getElementById("menuIcon").addEventListener("click",function(){document.getElementById("menuDropdown").classList.toggle("show-menu")});
document.getElementById("logoutBtn").addEventListener("click",async function(e){e.preventDefault();await supabase.auth.signOut();window.location.href="../login.html"});
document.getElementById("logoutNavBtn").addEventListener("click",async function(e){e.preventDefault();await supabase.auth.signOut();window.location.href="../login.html"});
document.getElementById("logoBtn").addEventListener("click",function(){window.location.href="../student-dashboard.html"});
});
</script>
</body>
</html>
