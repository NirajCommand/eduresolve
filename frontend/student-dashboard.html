<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Dashboard | EduResolve</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="student_style.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="theme.js"></script>
</head>
<body>

<nav class="navbar-custom">
  <div class="logo" id="logoBtn">
    <i class="fa-solid fa-graduation-cap"></i> EduResolve
  </div>
  <div class="nav-center">
    <a href="#">Account</a>
    <a href="#">Search</a>
    <a href="student-teams.html">My Courses</a>
  </div>
  <div class="nav-right">
<button id="modeBtn" class="mode-btn">
  <i class="fa-solid fa-moon"></i>
</button>
<button id="logoutNavBtn" class="logout-nav-btn">
  <i class="fa-solid fa-right-from-bracket"></i>
</button>

<div class="menu">
  <i class="fa-solid fa-bars" id="menuIcon"></i>

  <div class="menu-dropdown" id="menuDropdown">
    <a href="#">Profile</a>
    <a href="#">Registered Courses</a>
    <a href="#">Language</a>
    <a href="#" id="logoutBtn">Logout</a>
  </div>
</div>
  </div>
</nav>

<div class="welcome-section">
  <div class="welcome-left">
    <h3 id="welcomeText">Loading...</h3>
    <p id="welcomeSub"></p>
  </div>
  <div class="welcome-right">
    <h5 id="institutionName"></h5>
    <p id="todayDate"></p>
  </div>
</div>

<div class="dashboard-container">
  
  <div class="updates-panel">
    <h4>Academic Updates</h4>
    <div id="updatesContainer">Loading...</div>
  </div>
  
  <div class="actions-panel">
<div class="action-card" id="teamsCard">
  <i class="fa-solid fa-users"></i>
  <h5>Teams</h5>
  <p>Collaboration and announcements</p>
</div>

<div class="action-card" id="raiseQueryCard">
  <i class="fa-solid fa-question"></i>
  <h5>Raise Query</h5>
</div>


<div class="action-card" id="queryStatusCard">
  <i class="fa-solid fa-clipboard-check"></i>
  <h5>Query Status</h5>
</div>


<div class="action-card" id="studyMaterialsCard">
  <i class="fa-solid fa-book"></i>
  <h5>Study Materials</h5>
</div>

<div class="action-card" id="quizCard">
  <i class="fa-solid fa-pen"></i>
  <h5>My Quizzes</h5>
</div>

<div class="action-card" id="assignmentCard">
  <i class="fa-solid fa-file-lines"></i>
  <h5>Assignments</h5>
</div>

<div class="action-card" id="codingExamCard">
  <i class="fa-solid fa-laptop-code"></i>
  <h5>Coding Exams</h5>
</div>

<div class="action-card" id="codePracticeCard">
  <i class="fa-solid fa-code"></i>
  <h5>Code Practice</h5>
</div>

<div class="action-card" id="formsCard">
  <i class="fa-solid fa-file-lines"></i>
  <h5>Forms</h5>
</div>

<div class="action-card">
  <i class="fa-solid fa-bell"></i>
  <h5>Notifications</h5>
</div>
 </div>
</div>

<script>

document.addEventListener("DOMContentLoaded", async function(){

   const SUPABASE_URL = "https://zwpjavmrgveckswnobhg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3cGphdm1yZ3ZlY2tzd25vYmhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NDg0MzcsImV4cCI6MjA4ODAyNDQzN30.jZUB2M-mqpWC1vkiMyVJFZU9ez0wKXsiTPbg8ndNITw";

  const { createClient } = supabase;
  const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  
  const { data:{ user } } = await client.auth.getUser();

  if(!user){
    window.location.href="login.html";
    return;
  }

  const { data: profile } = await client
    .from("users")
    .select("name, institution, role")
    .eq("id", user.id)
    .single();

  if(!profile || profile.role !== "student"){
    window.location.href="login.html";
    return;
  }

  
  const messages = [
    "Stay consistent. Small progress daily leads to big results.",
    "Focus on understanding deeply.",
    "Discipline builds academic strength.",
    "Consistency beats intensity."
  ];

  const index =
    Math.floor(Date.now()/(24*60*60*1000)) % messages.length;

  document.getElementById("welcomeText").innerText =
    "Welcome, " + profile.name;

  document.getElementById("welcomeSub").innerText =
    messages[index];

  document.getElementById("institutionName").innerText =
    profile.institution;

  document.getElementById("todayDate").innerText =
    new Date().toLocaleDateString(
      "en-IN",
      {weekday:"long",year:"numeric",month:"long",day:"numeric"}
    );

  
  const { data: memberships } = await client
    .from("team_members")
    .select("team_id")
    .eq("student_id", user.id)
    .eq("status","approved");

  const teamIds = memberships?.map(m => m.team_id) || [];

  
  const { data: hodAnnouncements } = await client
    .from("announcements")
    .select("title, description, created_at, role, target_role")
    .eq("institution", profile.institution)
    .eq("role","hod")
    .or("target_role.eq.student,target_role.eq.both");

  
  let teacherAnnouncements = [];

  if(teamIds.length > 0){
    const { data } = await client
      .from("announcements")
      .select("title, description, created_at, role, target_role")
      .in("team_id", teamIds)
      .eq("role","teacher")
      .or("target_role.eq.student,target_role.eq.both");

    teacherAnnouncements = data || [];
  }

  const allAnnouncements = [
    ...(hodAnnouncements || []),
    ...(teacherAnnouncements || [])
  ].sort((a,b)=>
    new Date(b.created_at) - new Date(a.created_at)
  );

  const updatesContainer =
    document.getElementById("updatesContainer");

  function renderAnnouncements(announcements){
    updatesContainer.innerHTML="";
    if(announcements.length === 0){
      updatesContainer.innerHTML="No updates yet.";
    } else {
      announcements.slice(0,10).forEach(a=>{
        updatesContainer.innerHTML += `
          <div class="update-item">
            <strong>${a.title}</strong>
            <p>${a.description}</p>
            <small>${a.role.toUpperCase()}</small>
          </div>
        `;
      });
    }
  }

  renderAnnouncements(allAnnouncements);

  
  client
    .channel("student-announcements-" + profile.institution)
    .on(
      "postgres_changes",
      {
        event: "INSERT",
        schema: "public",
        table: "announcements",
        filter: "institution=eq." + profile.institution
      },
      (payload) => {
        const newAnn = payload.new;
        const isHod = newAnn.role === "hod";
        const isTeacher = newAnn.role === "teacher";
        const isTargetedToStudent = !newAnn.target_role ||
          newAnn.target_role === "student" ||
          newAnn.target_role === "both";
        const isTeacherTeamRelevant = !newAnn.team_id ||
          teamIds.includes(newAnn.team_id);

        if((isHod && isTargetedToStudent) ||
           (isTeacher && isTargetedToStudent && isTeacherTeamRelevant)){
          allAnnouncements.unshift(newAnn);
          allAnnouncements.sort((a,b)=>
            new Date(b.created_at) - new Date(a.created_at)
          );
          renderAnnouncements(allAnnouncements);
        }
      }
    )
    .subscribe();

  
  document.getElementById("teamsCard")
    .addEventListener("click", function(){
      window.location.href="student-teams.html";
    });

  document.getElementById("logoBtn")
    .addEventListener("click", function(){
      window.location.href="student-dashboard.html";
    });

  
  document.getElementById("menuIcon")
    .addEventListener("click", function(){
      document.getElementById("menuDropdown")
        .classList.toggle("show-menu");
    });

  
  document.getElementById("logoutBtn")
    .addEventListener("click", async function(e){
      e.preventDefault();
      await client.auth.signOut();
      window.location.href="login.html";
    });

  document.getElementById("logoutNavBtn")
    .addEventListener("click", async function(e){
      e.preventDefault();
      await client.auth.signOut();
      window.location.href="login.html";
    });

    document.getElementById("raiseQueryCard")
.addEventListener("click",function(){
window.location.href="student-raise-query.html";
});

document.getElementById("queryStatusCard")
.addEventListener("click",function(){
window.location.href="student-query-status.html";
});

document.getElementById("studyMaterialsCard")
.addEventListener("click",function(){
window.location.href="study-material/student-materials.html";
});

document.getElementById("quizCard")
.addEventListener("click",function(){
window.location.href="quiz/student-quiz-list.html";
});

document.getElementById("assignmentCard")
.addEventListener("click",function(){
window.location.href="assignment/student-assignment-list.html";
});

document.getElementById("codingExamCard")
.addEventListener("click",function(){
window.location.href="coding-exam/student-exam-list.html";
});

document.getElementById("codePracticeCard")
.addEventListener("click",function(){
window.location.href="coding/coding.html";
});

document.getElementById("formsCard")
.addEventListener("click",function(){
window.location.href="Forms/form-builder.html";
});

});

</script>
</body>
</html>
